<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportar e Importar a Supabase - COHAB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2rem;
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 2rem;
        }
        .section {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #667eea;
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .log {
            background: #000;
            color: #00ff00;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 1rem;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .info { color: #3b82f6; }
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        .hint {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 0.75rem;
            border-radius: 0.25rem;
            margin: 1rem 0;
            font-size: 0.85rem;
            color: #856404;
        }
        .step-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Exportar e Importar a Supabase</h1>
        
        <div class="section">
            <h2><span class="step-number">1</span>Exportar desde localStorage</h2>
            <p>Si puedes ver tus alumnos en la app, están guardados en tu navegador.</p>
            <button onclick="exportarDesdeLocalStorage()">📤 Exportar Alumnos</button>
            <textarea id="exportData" placeholder="Los datos exportados aparecerán aquí..." readonly></textarea>
            <div class="hint" id="exportHint" style="display: none;">
                ✅ <strong>Datos exportados!</strong> Copia todo el texto de arriba y pégalo en el paso 2.
            </div>
        </div>
        
        <div class="section">
            <h2><span class="step-number">2</span>Importar a Supabase</h2>
            <p>Pega los datos exportados aquí:</p>
            <textarea id="importData" placeholder='Pega aquí los datos exportados (debe ser un JSON como: [{"id":"...","nombre":"..."}])'></textarea>
            <button onclick="importarASupabase()">📥 Importar a Supabase</button>
            <div class="log" id="log"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function exportarDesdeLocalStorage() {
            try {
                // Intentar obtener de localStorage
                const alumnosLocal = localStorage.getItem('alumnos');
                
                if (!alumnosLocal) {
                    alert('❌ No se encontraron alumnos en localStorage.\n\nAsegúrate de estar en la misma página donde puedes ver tus alumnos.');
                    return;
                }
                
                const alumnos = JSON.parse(alumnosLocal);
                
                if (!Array.isArray(alumnos) || alumnos.length === 0) {
                    alert('❌ No hay alumnos para exportar.');
                    return;
                }
                
                // Mostrar en textarea
                document.getElementById('exportData').value = JSON.stringify(alumnos, null, 2);
                document.getElementById('exportHint').style.display = 'block';
                
                alert(`✅ ${alumnos.length} alumnos exportados!\n\nAhora copia todo el texto y pégalo en el Paso 2.`);
                
            } catch (error) {
                alert(`❌ Error al exportar: ${error.message}`);
            }
        }
        
        async function importarASupabase() {
            const importData = document.getElementById('importData').value.trim();
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = '';
            
            if (!importData) {
                log('❌ Por favor pega los datos exportados', 'error');
                return;
            }
            
            try {
                // Parsear datos
                const alumnos = JSON.parse(importData);
                
                if (!Array.isArray(alumnos)) {
                    throw new Error('Los datos deben ser un array de alumnos');
                }
                
                log(`📊 ${alumnos.length} alumnos encontrados`, 'info');
                
                // Conectar a Supabase
                const supabaseUrl = localStorage.getItem('supabaseUrl');
                const supabaseKey = localStorage.getItem('supabaseAnon');
                
                if (!supabaseUrl || !supabaseKey) {
                    throw new Error('Supabase no está configurado. Ve a configurar-supabase.html primero.');
                }
                
                log('🔌 Conectando a Supabase...', 'info');
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                log('✅ Conectado a Supabase', 'success');
                
                // Importar cada alumno
                let importados = 0;
                let errores = 0;
                
                for (let i = 0; i < alumnos.length; i++) {
                    const alumno = alumnos[i];
                    
                    try {
                        // Mapear campos
                        const alumnoSupabase = {
                            id: alumno.id,
                            nombre: alumno.nombre,
                            email: alumno.email || null,
                            telefono: alumno.telefono || null,
                            fecha_pago: alumno.fechaPago,
                            dia_pago: alumno.diaPago || 30,
                            monto: alumno.monto || 0
                        };
                        
                        // Insertar en Supabase (upsert para evitar duplicados)
                        const { error } = await supabase
                            .from('alumnos')
                            .upsert(alumnoSupabase, { onConflict: 'id' });
                        
                        if (error) {
                            log(`⚠️ Error al importar ${alumno.nombre}: ${error.message}`, 'warning');
                            errores++;
                        } else {
                            importados++;
                            log(`✅ ${alumno.nombre} importado (${i + 1}/${alumnos.length})`, 'success');
                        }
                        
                    } catch (error) {
                        log(`❌ Error al importar ${alumno.nombre}: ${error.message}`, 'error');
                        errores++;
                    }
                }
                
                // Resumen
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                log(`🎉 IMPORTACIÓN COMPLETADA`, 'success');
                log(`✅ Importados: ${importados}`, 'success');
                if (errores > 0) {
                    log(`⚠️ Errores: ${errores}`, 'warning');
                }
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                log('', 'info');
                log('✅ ¡Listo! Ahora recarga tu app y verás todos los alumnos', 'success');
                
                alert(`✅ Importación completada!\n\n✅ ${importados} alumnos importados\n${errores > 0 ? `⚠️ ${errores} errores` : ''}\n\nAhora recarga tu app (Cmd+R o Ctrl+R)`);
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                alert(`❌ Error: ${error.message}`);
            }
        }
    </script>
</body>
</html>
