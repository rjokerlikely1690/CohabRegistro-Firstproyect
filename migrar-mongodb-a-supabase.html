<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migración MongoDB → Supabase - COHAB</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }
        .step {
            background: rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 0.5rem;
            border-left: 4px solid #10b981;
        }
        .step h3 {
            margin-top: 0;
        }
        input, button {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 0.5rem;
            border: none;
            font-size: 1rem;
        }
        input {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        button {
            background: #10b981;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .log {
            background: #000;
            color: #00ff00;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 1rem;
        }
        .log-entry {
            margin: 0.25rem 0;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .info { color: #3b82f6; }
        .progress {
            width: 100%;
            height: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #3b82f6);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Migración MongoDB → Supabase</h1>
        
        <div class="step">
            <h3>📋 Paso 1: Configuración de MongoDB (origen)</h3>
            <input type="text" id="mongoUrl" placeholder="URL de MongoDB API (ej: https://tu-proyecto.railway.app)" 
                   value="https://cohabregistro-firstproyect-production.up.railway.app">
        </div>
        
        <div class="step">
            <h3>🎯 Paso 2: Configuración de Supabase (destino)</h3>
            <input type="text" id="supabaseUrl" placeholder="Supabase URL (ej: https://xxx.supabase.co)">
            <input type="password" id="supabaseKey" placeholder="Supabase Anon Key">
            <button onclick="testSupabase()">🧪 Probar Conexión Supabase</button>
        </div>
        
        <div class="step">
            <h3>🚀 Paso 3: Migrar Datos</h3>
            <button onclick="migrarDatos()" id="btnMigrar">
                ▶️ Iniciar Migración
            </button>
            <div class="progress" id="progressContainer" style="display: none;">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
        </div>
        
        <div class="log" id="log"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabaseClient = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function updateProgress(current, total) {
            const progressBar = document.getElementById('progressBar');
            const percent = Math.round((current / total) * 100);
            progressBar.style.width = percent + '%';
            progressBar.textContent = percent + '%';
        }
        
        async function testSupabase() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            
            if (!url || !key) {
                log('❌ Por favor ingresa URL y Key de Supabase', 'error');
                return;
            }
            
            try {
                log('🔍 Probando conexión a Supabase...', 'info');
                supabaseClient = window.supabase.createClient(url, key);
                
                // Probar consulta
                const { data, error } = await supabaseClient
                    .from('alumnos')
                    .select('count')
                    .limit(1);
                
                if (error) {
                    log(`❌ Error: ${error.message}`, 'error');
                    log('💡 Asegúrate de haber creado la tabla "alumnos" en Supabase', 'warning');
                    return;
                }
                
                log('✅ Conexión exitosa a Supabase', 'success');
                log('✅ Tabla "alumnos" encontrada', 'success');
                
            } catch (error) {
                log(`❌ Error al conectar: ${error.message}`, 'error');
            }
        }
        
        async function migrarDatos() {
            const mongoUrl = document.getElementById('mongoUrl').value.trim();
            const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
            const supabaseKey = document.getElementById('supabaseKey').value.trim();
            
            if (!mongoUrl || !supabaseUrl || !supabaseKey) {
                log('❌ Por favor completa todos los campos', 'error');
                return;
            }
            
            const btnMigrar = document.getElementById('btnMigrar');
            const progressContainer = document.getElementById('progressContainer');
            
            btnMigrar.disabled = true;
            progressContainer.style.display = 'block';
            
            try {
                // Paso 1: Conectar a Supabase
                log('🔌 Conectando a Supabase...', 'info');
                supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
                log('✅ Conectado a Supabase', 'success');
                
                // Paso 2: Obtener datos de MongoDB
                log('📡 Obteniendo alumnos desde MongoDB...', 'info');
                const response = await fetch(`${mongoUrl}/alumnos`);
                
                if (!response.ok) {
                    throw new Error(`MongoDB respondió con status ${response.status}`);
                }
                
                const mongoData = await response.json();
                const alumnos = mongoData.data || mongoData;
                
                if (!Array.isArray(alumnos)) {
                    throw new Error('Respuesta de MongoDB no es un array');
                }
                
                log(`✅ ${alumnos.length} alumnos obtenidos de MongoDB`, 'success');
                
                // Paso 3: Migrar cada alumno
                log('🔄 Iniciando migración...', 'info');
                let migrados = 0;
                let errores = 0;
                
                for (let i = 0; i < alumnos.length; i++) {
                    const alumno = alumnos[i];
                    updateProgress(i + 1, alumnos.length);
                    
                    try {
                        // Mapear campos de MongoDB a Supabase
                        const alumnoSupabase = {
                            id: alumno.id,
                            nombre: alumno.nombre,
                            email: alumno.email || null,
                            telefono: alumno.telefono || null,
                            fecha_pago: alumno.fechaPago,
                            dia_pago: alumno.diaPago || 30,
                            monto: alumno.monto || 0
                        };
                        
                        // Insertar en Supabase (upsert para evitar duplicados)
                        const { error } = await supabaseClient
                            .from('alumnos')
                            .upsert(alumnoSupabase, { onConflict: 'id' });
                        
                        if (error) {
                            log(`⚠️ Error al migrar ${alumno.nombre}: ${error.message}`, 'warning');
                            errores++;
                        } else {
                            migrados++;
                            log(`✅ ${alumno.nombre} migrado correctamente`, 'success');
                        }
                        
                    } catch (error) {
                        log(`❌ Error al migrar ${alumno.nombre}: ${error.message}`, 'error');
                        errores++;
                    }
                }
                
                // Resumen final
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                log(`🎉 MIGRACIÓN COMPLETADA`, 'success');
                log(`✅ Migrados: ${migrados}`, 'success');
                if (errores > 0) {
                    log(`⚠️ Errores: ${errores}`, 'warning');
                }
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                log('', 'info');
                log('📋 PRÓXIMOS PASOS:', 'info');
                log('1. Configura Supabase en admin.html', 'info');
                log('2. Verifica que los datos se vean correctamente', 'info');
                log('3. ¡Listo! Ya no necesitas MongoDB', 'success');
                
            } catch (error) {
                log(`❌ Error durante la migración: ${error.message}`, 'error');
            } finally {
                btnMigrar.disabled = false;
            }
        }
        
        // Auto-cargar si hay valores en localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const savedSupabaseUrl = localStorage.getItem('supabaseUrl');
            const savedSupabaseKey = localStorage.getItem('supabaseAnon');
            
            if (savedSupabaseUrl) {
                document.getElementById('supabaseUrl').value = savedSupabaseUrl;
            }
            if (savedSupabaseKey) {
                document.getElementById('supabaseKey').value = savedSupabaseKey;
            }
            
            log('🚀 Herramienta de migración lista', 'info');
            log('📝 Completa los campos y haz clic en "Iniciar Migración"', 'info');
        });
    </script>
</body>
</html>
